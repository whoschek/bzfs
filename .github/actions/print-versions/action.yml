name: print-versions
description: Display ZFS version and Python version

runs:
  using: composite
  steps:
    - name: Display ZFS version and Python version
      shell: bash
      run: |
        id -u -n
        uname -a
        zfs --version
        python3 --version
        ssh -V
        zstd --version
        pv --version | head -n 1
        mbuffer --version |& head -n 1
        command -v sh | xargs ls -l
