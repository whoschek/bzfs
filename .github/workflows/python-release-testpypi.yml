# This workflow safely reproduces PyPI publish failures against TestPyPI with verbose upload logs.

name: Upload Package to TestPyPI on Demand

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to build and upload (branch, tag, or commit SHA)
        required: true
        default: main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
        ref: ${{ inputs.git_ref }}
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.12
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install build
    - name: Build package
      run: python3 -m build
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # aka v1.13.0; see https://github.com/pypa/gh-action-pypi-publish
      with:
        repository-url: https://test.pypi.org/legacy/
        user: __token__
        password: ${{ secrets.TEST_PYPI_API_TOKEN }}
        verbose: true
