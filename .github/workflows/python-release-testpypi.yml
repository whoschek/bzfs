# This workflow safely reproduces PyPI publish failures against TestPyPI with verbose upload logs.

name: Upload Package to TestPyPI on Demand

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to build and upload (branch, tag, or commit SHA)
        required: true
        default: main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment:
      name: testpypi
      url: https://test.pypi.org/p/bzfs
    permissions:
      id-token: write # for PyPI's trusted publishing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # aka v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.git_ref }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # aka v6.2.0
        with:
          python-version: 3.12
      - name: Install dependencies
        run: |
          . ./preinstall_dev.sh
          python3 -m pip install build
      - name: Build package
        run: python3 -m build
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # aka v1.14.0; see https://github.com/pypa/gh-action-pypi-publish
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true
