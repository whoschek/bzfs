# This workflow safely reproduces PyPI publish failures against TestPyPI with verbose upload logs.

name: Upload Package to TestPyPI on Demand

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to build and upload (branch, tag, or commit SHA)
        required: true
        default: main

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment:
      name: testpypi
    permissions:
      id-token: write # for PyPI's trusted publishing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # aka v6.0.3
        with:
          persist-credentials: false
          ref: ${{ inputs.git_ref }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # aka v6.2.0
        with:
          python-version: 3.14
      - name: make_release
        run: |
          MAKE_RELEASE_PUBLISH=true MAKE_RELEASE_TESTPYPI=true ./.github-workflow-scripts/make_release.sh
