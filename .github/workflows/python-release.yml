# This workflow will upload a Python Package to PyPI when a release is created
# For more information see: https://docs.github.com/en/actions/use-cases-and-examples/building-and-testing/building-and-testing-python#publishing-to-pypi

name: Upload Package to PyPI on Release

on:
  release:
    types: [published]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment:
      name: pypi
    permissions:
      id-token: write # for PyPI's trusted publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # aka v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # aka v6.3.0
        with:
          python-version: 3.14
      - name: make_release
        run: |
          MAKE_RELEASE_PUBLISH=true ./.github-workflow-scripts/make_release.sh
