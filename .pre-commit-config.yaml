# ------------------------------------------------------------------------------------------
# pre‑commit configuration for this repository; see https://github.com/pre-commit/pre-commit
# ------------------------------------------------------------------------------------------
# How to enable the Git hook on your machine (do this once per git clone):
#   1. Install the helper tool:
#          python3 -m pip install pre-commit
#   2. From the project root directory run:
#          pre-commit install --install-hooks
#      This writes an executable hook into .git/hooks/pre-commit that will run the checks
#      defined below every time you commit.
#   3. Whenever you update this YAML config file, run that same command again so the hook
#      picks up the new configuration.
#
# Optional maintenance commands:
#   * pre-commit run --all-files        # Run hooks on the whole repo
#   * pre-commit run --all-files --hook-stage manual  # Also run manual hooks (e.g. pylint)
#   * pre-commit uninstall              # Remove the .git/hooks/pre-commit hook script
#   * pre-commit uninstall; pre-commit clean; pre-commit install --install-hooks  # Reinstall from scratch
#
# These steps are also mirrored in CI (`pre-commit run --all-files --hook-stage manual`) to
# guarantee that the same checks are enforced everywhere.
# ------------------------------------------------------------------------------------------
fail_fast: true                         # Abort on first failing hook
default_install_hook_types:
  - pre-commit
  - commit-msg
default_language_version:
  golang: 1.26.3
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # aka v6.0.0
    hooks:
      - id: detect-private-key          # Prevent the accidental inclusion of private keys in your commits
      - id: check-merge-conflict        # Check that merge conflicts are not being committed
      - id: check-toml                  # Attempt to load all TOML files to verify syntax
      - id: check-yaml                  # Attempt to load all YAML files to verify syntax
      - id: check-xml                   # Attempt to load all XML files to verify syntax via xmllint
      - id: check-json                  # Attempt to load all JSON files to verify syntax
      - id: pretty-format-json          # Auto-format JSON files
        args: [
          --autofix,
          --indent=4,
          --no-ensure-ascii,            # Keep non-ASCII chars verbatim
          --no-sort-keys,               # Preserve original key order
          --top-keys="",                # No keys forced to the top
        ]
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks              # Check for symlinks that do not point to anything
      - id: mixed-line-ending
        args: [--fix=lf]                # Replace line endings with linefeed
      - id: trailing-whitespace         # Remove whitespace from the end of lines
      - id: end-of-file-fixer           # Remove whitespace from the end of files and replace end of files with linefeed
  - repo: local
    hooks:
      - id: shfmt                       # Auto-format shell scripts
        name: shfmt
        language: golang
        entry: shfmt
        types: [shell]
        args: [                         # See https://github.com/mvdan/sh/blob/v3.13.1/cmd/shfmt/shfmt.1.scd
          --write,                      # Change files instead of printing to stdout
          --indent=4,                   # Use 4-space indentation for shell scripts
          --keep-padding,               # Preserve comment padding
          --space-redirects,            # Keep space after redirection operators
          --case-indent,                # Indent switch cases
        ]
        additional_dependencies: [mvdan.cc/sh/v3/cmd/shfmt@2f3f5e36d9b0f8f14c998d50aa20a28832205ae8]  # aka v3.13.1
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95  # aka v0.11.0.1
    hooks:
      - id: shellcheck                  # Validate syntax of shell scripts
  # Temporarily uncomment this hook when editing .github/dependabot.yml or Docker Compose files
  # - repo: https://github.com/python-jsonschema/check-jsonschema
  #   rev: f805888065fdb6162e1f800e50bb9460cbd223d6  # aka 0.37.2
  #   hooks:
  #     - id: check-github-workflows      # Validate syntax of GitHub Workflow YAML files
  #     - id: check-github-actions        # Validate syntax of GitHub Action YAML files
  #     - id: check-compose-spec          # Validate syntax of Docker Compose files
  #     - id: check-dependabot            # Validate syntax of Dependabot config files
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # aka v1.7.12
    hooks:
      - id: actionlint                  # Validate semantics (and some syntax) of GitHub Workflow YAML files
        args: [--shellcheck=.venv/bin/shellcheck]
  # - repo: https://github.com/woodruffw/zizmor-pre-commit  # also see https://github.com/zizmorcore/zizmor
  #   rev: a4727cbbcd26d7098e96b9cb738169b59711ae51  # aka v1.24.1
  #   hooks:
  #     - id: zizmor                              # Validate syntax of GitHub Workflow YAML files
  #       args: [--fix=all]
  - repo: https://github.com/DanielNoord/pydocstringformatter
    rev: d5190a85272ddf6a3d14bfd88ab327f84aa2a0a7  # aka v0.7.5
    hooks:
      - id: pydocstringformatter        # Reformat Python docstrings and wrap them to a specific line length
        args: [                         # see https://pydocstringformatter.readthedocs.io/en/latest/usage.html
          "--write",                    # Let pre-commit make changes to files instead of printing diffs
          "--max-line-length=126",      # Summary / long-description length
          "--linewrap-full-docstring",  # Wrap full docstrings, matching the prior prose wrapping intent
          "--no-split-summary-body",    # Avoid inferring prose structure from punctuation
          "--no-capitalize-first-letter", # Preserve author-written capitalization
          "--no-final-period",          # Preserve author-written wording and punctuation
          "--no-closing-quotes",        # Don't fix the position of the closing quotes
        ]
  - repo: https://github.com/pycqa/isort
    rev: ec0efaee4acfce198521e43caa3029b06cedd64a  # aka 6.1.0
    hooks:
      - id: isort                       # Reformat Python imports more precisely than ruff (via force_grid_wrap)
        stages: [manual]  # Slow; only runs manually or in CI via 'pre-commit run --all-files --hook-stage manual'
      # config options like `force_grid_wrap` live in pyproject.toml
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 5e2fb545eba1ea9dc051f6f962d52fe8f76a9794  # aka v0.15.13
    hooks:
      - id: ruff-check                  # Run `ruff` linter to check if there are problems in the Python source code
      # config options like `target-version` live in pyproject.toml
  - repo: https://github.com/pycqa/pylint
    rev: 88e1ab7545a4af4aea15c305a154c164a95ab842  # aka v4.0.5
    hooks:
      - id: pylint                      # Run `pylint` linter to check if there are problems in the Python source code
        name: pylint (cyclic imports, etc)
        stages: [manual]  # Slow; only runs manually or in CI via 'pre-commit run --all-files --hook-stage manual'
        files: '^(?!bzfs_tests/).*\.py$'  # Run on all Python files except bzfs_tests/
        # config options like `enable` live in pyproject.toml
  - repo: https://github.com/facebook/pyrefly-pre-commit
    rev: ef09b1b600419b206ac1a8c6ba4ab224a9ed58c3  # aka 1.0.0
    hooks:
      - id: pyrefly-check
        alias: pyrefly-infer
        name: "pyrefly infer (auto-fix types)"
        entry: pyrefly infer --containers=true
        exclude: '.*'  # Skip this hook. Comment out this line to enable this hook.
        pass_filenames: false
      - id: pyrefly-check
        name: "pyrefly check (type checking)"
        exclude: '.*'  # Skip this hook. Comment out this line to enable this hook.
        pass_filenames: false
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: fc0f09a29bb495f4a91f00266155d6282d52485d  # aka v1.20.2
    hooks:
      - id: mypy                             # Run `mypy` Python type checker
        exclude: '^\.git.*$'
        # config options like `select` live in pyproject.toml
  - repo: local
    hooks:
      - id: forbid-noqa-E
        name: "forbid '# noqa: E' (pycodestyle errors)"
        language: pygrep
        entry: '#\s*noqa:\s*E(?!501\b)\d+\b' # noqa: E except E501
        types: [python]  # only scan *.py
      - id: forbid-noqa-F
        name: "forbid '# noqa: F' (pyflakes)"
        language: pygrep
        entry: '#\s*noqa:\s*F(?!821\b)\d+\b' # noqa: F except F821
        types: [python]
      - id: forbid-non-empty-init-py
        name: "forbid non-empty __init__.py"
        language: pygrep
        entry: '\S'                          # forbid any non-whitespace character
        files: '.*\/__init__\.py$'
      - id: forbid-dunder-all
        name: "forbid __all__ definitions"
        language: pygrep
        entry: '^__all__\s*='                # forbids any assignment to __all__
        types: [python]
      - id: forbid-aliased-import-of-modules
        name: "forbid aliased import of modules"    # e.g. forbids 'import bzfs_main.bzfs as foo'
        language: pygrep
        entry: '^\s*import\s+bzfs_\w+(\.\w+)*\s+as\s+\w+\s*'
        types: [python]
      - id: forbid-aliased-import-of-attributes
        name: "forbid aliased import of attributes" # e.g. forbids 'from bzfs_main import bzfs as foo'
        language: pygrep
        args: [--multiline]
        entry: '^\s*from\s+bzfs_\w+(\.\w+)*\s+import\s+(\(\n\s*)?(?!PROG_NAME)\w+(\.\w+)*\s+as\s+\w+\s*'
        types: [python]
      - id: forbid-ambiguous-characters
        name: "forbid ambiguous characters"
        language: pygrep
        entry: '…|—|–|“|”|‘|’|→'                # replace ambiguous with unambiguous characters (em dash, curly quotes, etc)
        exclude: '^\.pre-commit-config\.yaml$'
        types_or: [python, shell, markdown, yaml, toml]
  - repo: local
    hooks:
      - id: prettier-markdown                   # Auto-format Markdown files
        name: prettier (markdown)
        language: system
        entry: tools/prettier
        require_serial: true
        types: [markdown]
        args: [                                 # See https://prettier.io/docs/cli and https://prettier.io/docs/options
          --check,
          --write,
          --print-width=120,
          --prose-wrap=always,                  # Wrap prose if it exceeds the print width
          --embedded-language-formatting=auto,  # Keep Prettier's default embedded formatting
        ]
        exclude: '^(README.*|prd)\.md$'
      - id: prettier-yaml                       # Auto-format YAML files
        name: prettier (yaml)
        language: system
        entry: tools/prettier
        require_serial: true
        types: [yaml]
        args: [
          --check,
          --write,
          --print-width=125,
        ]
        exclude: '^\.pre-commit-config\.yaml$'
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: fa505ab9c3e0fedafe1709fd7ac2b5f8996c670d  # aka 26.3.1
    hooks:
      - id: black                               # Run `black` Python code formatter
      # style options like `line_length` live in pyproject.toml
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 91ab4bf57e58b32adf1a122681f6ebe164d081c8  # aka v4.4.0
    hooks:
      - id: conventional-pre-commit             # Check commit msg has the form `type(scope): description`
        stages: [commit-msg]
        args: [
          --no-color,
          --verbose,
          build, bump, chore, ci, docs, feat, fix, perf, refactor, style, test
        ]
